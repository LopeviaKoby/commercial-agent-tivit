version: 2
status: provisional
scope: "FRD case routing and provisional implementation rules"
validated_by_operator: false
source_documents:
  - "docs/current_state.md"
  - "docs/pending_validations.md"
  - "docs/data_dictionary.yaml"
global_defaults:
  source_relationship_mode: "independent_sources"
  allow_productive_join_between_pipe_and_ganadas: false
  allow_fuzzy_matching: false
  allow_budget_inference_without_master: false
  allow_pipeline_sum_without_monetary_validation: false
  allow_lob_answer_from_bu_without_validation: false
  blocked_response_policy:
    status: "blocked"
    message_template: "La pregunta requiere una fuente oficial o una validación funcional que aún no existe."
  conditional_response_policy:
    status: "conditional"
    message_template: "La pregunta es técnicamente cercana, pero sigue pendiente de validación funcional."
rules:
  - id: "R1"
    name: "source_selection_by_case"
    state: "observed"
    rule: "Cada caso FRD debe declarar una fuente oficial explícita antes de habilitar respuestas."
  - id: "R2"
    name: "pipe_granularity_guard"
    state: "supported_hypothesis"
    rule: "Pipe no debe agregarse ciegamente por fila hasta validar qué representa una fila y qué representa TVT."
  - id: "R3"
    name: "monetary_field_by_context"
    state: "pending_validation"
    rule: "El campo monetario oficial depende del contexto: pipeline, ganadas, revenue real o mix."
  - id: "R4"
    name: "temporal_field_by_metric"
    state: "pending_validation"
    rule: "La fecha oficial debe mapearse por tipo de métrica y no asumirse una sola para todo."
  - id: "R5"
    name: "no_cross_source_join_without_key"
    state: "observed"
    rule: "Pipe y Ganadas deben tratarse como fuentes independientes mientras no exista llave validada."
