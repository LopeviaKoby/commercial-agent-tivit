semantic_crosswalk:
  version: 1
  status: provisional
  validated_by_operator: false
  scope: "Semantic crosswalk between FRD-required datasets and observed columns in Pipe and Ganadas"
  source_documents:
    - "docs/current_state.md"
    - "docs/pending_validations.md"
    - "docs/data_dictionary.yaml"
    - "docs/business_rules.yaml"
  mapping_status_legend:
    observed_equivalent: "The required FRD field has a directly observed structural equivalent."
    candidate_needs_validation: "A plausible observed column exists, but semantic equivalence is not yet validated."
    missing: "No sufficient column or source exists in the current repository."
    unsafe_without_operator: "A tempting mapping exists, but using it now would create high functional risk."
  datasets:
    - dataset_id: "summary_snapshot"
      description: "Consolidated regional or country summary expected from FRD tabs like Resumen."
      frd_cases: ["1.1", "1.2", "2.1", "5.1"]
      fields:
        - semantic_field_id: "actual_ytd_acv"
          business_label: "ACV real acumulado YTD"
          frd_column_name: "Act-26"
          expected_source: "Resumen"
          affected_cases: ["1.1", "1.2", "2.1"]
          overall_status: "missing"
          implementation_note: "Do not infer YTD actual sales from Pipe or Ganadas while the summary source is absent."
          observed_mappings:
            - source_name: "Pipe"
              column_name: null
              mapping_status: "missing"
              notes: "Pipe contains operational ACV fields, not a consolidated YTD actual metric."
            - source_name: "Ganadas"
              column_name: null
              mapping_status: "missing"
              notes: "Ganadas has won-deal amounts but no validated equivalent to Act-26."
        - semantic_field_id: "budget_ytd"
          business_label: "Budget o cuota acumulada"
          frd_column_name: "Bud-26"
          expected_source: "Resumen"
          affected_cases: ["1.1", "2.1"]
          overall_status: "missing"
          implementation_note: "Budget-driven questions remain blocked until a summary source exists."
          observed_mappings:
            - source_name: "Pipe"
              column_name: null
              mapping_status: "missing"
              notes: "No budget field observed."
            - source_name: "Ganadas"
              column_name: null
              mapping_status: "missing"
              notes: "No budget field observed."
        - semantic_field_id: "total_fy_target"
          business_label: "Meta anual total"
          frd_column_name: "TOTAL"
          expected_source: "Resumen"
          affected_cases: ["1.2"]
          overall_status: "missing"
          implementation_note: "Gap FY cannot be computed without an annual target."
          observed_mappings:
            - source_name: "Pipe"
              column_name: null
              mapping_status: "missing"
              notes: "No annual total target observed."
