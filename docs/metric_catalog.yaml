version: 2
status: provisional
scope: "FRD metrics and response capabilities"
validated_by_operator: false
source_documents:
  - "docs/business_rules.yaml"
  - "docs/current_state.md"
  - "docs/data_dictionary.yaml"
metrics:
  - metric_id: "frd_1_1_acv_ytd_vs_budget"
    frd_case_id: "1.1"
    label: "ACV YTD vs presupuesto regional"
    type: "kpi_lookup"
    response_status: "blocked_missing_source"
    source_requirement: "Resumen"
    monetary_field: null
    temporal_field: null
    dimensions:
      - "LATAM"
    business_question: "¿Cuál es el ACV YTD acumulado a la fecha en LATAM y su % de cumplimiento frente al budget?"
    implementation_note: "No responder sin fuente consolidada equivalente a Resumen."
  - metric_id: "frd_1_2_gap_fy"
    frd_case_id: "1.2"
    label: "Gap FY LATAM"
    type: "derived_gap"
    response_status: "blocked_missing_source"
    source_requirement: "Resumen"
    monetary_field: null
    temporal_field: null
    dimensions:
      - "LATAM"
    business_question: "¿Cuánto ACV nos falta vender para cumplir el objetivo de todo el año?"
    implementation_note: "Requiere budget anualizado y real acumulado oficial."
  - metric_id: "frd_1_3_new_logo_mix"
    frd_case_id: "1.3"
    label: "Mix nuevos logos vs protección de base"
    type: "classification_ratio"
    response_status: "conditional"
    source_requirement: "2026 Actual or validated Ganadas equivalent"
    monetary_field: "pending_operator"
    temporal_field: "Data de Fechamento Real_candidate"
    dimensions:
      - "Classificação"
    business_question: "¿Qué porcentaje de la venta YTD viene de Nuevos Logos vs protección de base?"
    implementation_note: "Esperar confirmación de equivalencia con ACV Real BSC y taxonomía oficial."
  - metric_id: "frd_2_1_country_performance"
    frd_case_id: "2.1"
    label: "Rendimiento geográfico consolidado"
    type: "country_ranking"
    response_status: "conditional"
    source_requirement: "Resumen or validated substitute"
    monetary_field: "pending_operator"
    temporal_field: "pending_operator"
    dimensions:
      - "País"
    business_question: "¿Cuánto ha vendido cada país y quién lidera el cumplimiento?"
    implementation_note: "No calcular cumplimiento sin % cumpl. oficial."
  - metric_id: "frd_3_1_top_bu_or_lob"
    frd_case_id: "3.1"
    label: "Unidad o línea con mayor revenue"
    type: "dimension_ranking"
    response_status: "conditional"
    source_requirement: "2026 Actual or validated real-sales source"
    monetary_field: "pending_operator"
    temporal_field: "pending_operator"
    dimensions:
      - "BU_or_LOB_pending_operator"
    business_question: "¿Cuál es la BU o línea de servicio con mayor revenue este año?"
    implementation_note: "No usar BU como LOB sin validación explícita."
  - metric_id: "frd_3_2_committed_pipeline_digital"
    frd_case_id: "3.2"
    label: "Pipeline committed para Digital Business"
    type: "filtered_pipeline_sum"
    response_status: "conditional"
    source_requirement: "Pipe or validated Pipe Total substitute"
    monetary_field: "ACV Item em Reais_candidate"
    temporal_field: "Data Estimada de Fechamento_candidate"
    dimensions:
      - "BU"
      - "Status"
    business_question: "¿Cuánto pipeline está Committed para Digital Business?"
    implementation_note: "Requiere validar monto y estado oficiales antes de sumar."
  - metric_id: "frd_4_1_top_salespeople"
    frd_case_id: "4.1"
    label: "Top performers y rezagados"
    type: "salesperson_ranking"
    response_status: "blocked_missing_source"
    source_requirement: "Resumen x Comercial Latam_2026"
    monetary_field: null
    temporal_field: null
    dimensions:
      - "Ejecutivo"
    business_question: "Lista a los 3 mejores ejecutivos y el porcentaje bajo 50% de cuota."
    implementation_note: "No existe fuente de cuota validada en el repo actual."
  - metric_id: "frd_4_3_visit_conversion"
    frd_case_id: "4.3"
    label: "Conversión por actividad"
    type: "productivity_ratio"
    response_status: "blocked_missing_source"
    source_requirement: "Detalle de visitas + Resumen x Comercial Latam_2026"
    monetary_field: null
    temporal_field: null
    dimensions:
      - "Ejecutivo"
    business_question: "¿Cuántas visitas en promedio requiere un ejecutivo para cerrar un negocio?"
    implementation_note: "No existe fuente de visitas observada."
  - metric_id: "frd_5_1_coverage_ratio"
    frd_case_id: "5.1"
    label: "Coverage ratio"
    type: "coverage_lookup"
    response_status: "blocked_missing_source"
    source_requirement: "Resumen"
    monetary_field: null
    temporal_field: null
    dimensions:
      - "LATAM"
    business_question: "¿Cuál es nuestra cobertura de pipeline real para alcanzar los números del año?"
    implementation_note: "No inferir coverage desde extractos operativos."
  - metric_id: "frd_5_2_qualification_stuck_value"
    frd_case_id: "5.2"
    label: "Dinero estancado en Qualificação"
    type: "filtered_pipeline_sum"
    response_status: "preloaded"
    source_requirement: "Pipe"
    monetary_field: "ACV Item em Reais_candidate"
    temporal_field: "pending_operator"
    dimensions:
      - "Fase"
    business_question: "¿Cuánto dinero tenemos estancado en etapa de Qualificação?"
    implementation_note: "Es el caso más cercano a ejecución; falta confirmar que el monto es oficial."
  - metric_id: "frd_5_3_top_negotiation_deals"
    frd_case_id: "5.3"
    label: "Top 3 negocios en Negociação"
    type: "filtered_top_n"
    response_status: "conditional"
    source_requirement: "Pipe or validated TOP tabs substitute"
    monetary_field: "ACV Item em Reais_candidate"
    temporal_field: "pending_operator"
    dimensions:
      - "Fase"
      - "Nombre da oportunidade"
    business_question: "¿Cuáles son los 3 negocios más grandes en Negociação?"
    implementation_note: "Permite ranking técnico, pero el monto oficial sigue pendiente."
  - metric_id: "frd_6_1_customer_concentration"
    frd_case_id: "6.1"
    label: "Riesgo de concentración de clientes"
    type: "pareto_ratio"
    response_status: "blocked_missing_source"
    source_requirement: "Paretto por pais"
    monetary_field: null
    temporal_field: "pending_operator"
    dimensions:
      - "País"
      - "Cliente"
    business_question: "¿Qué porcentaje de ingresos depende de los top 3 clientes?"
    implementation_note: "No calcular pareto desde extractos no validados."
